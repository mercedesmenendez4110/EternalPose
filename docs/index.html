<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eternal Pose - Auto</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; background:#111; color:#eee; }
  button { padding: 15px 25px; font-size: 16px; margin: 10px; border-radius: 8px; border:none; background:#2b7de9; color:white; }
  #estado { margin-top: 15px; font-size: 14px; color: #9f9; white-space: pre-line; }
</style>
</head>
<body>
  <h2>🧭 Eternal Pose</h2>
  <button onclick="conectar()">Conectar con el reloj</button>
  <p id="estado">Desconectado</p>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b2638";
let characteristic;
let lastCalSent = 0;

async function conectar() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "EternalPose_Watch" }],
      optionalServices: [SERVICE_UUID]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);

    document.getElementById("estado").innerText = "Conectado ✅\nEnviando datos automáticamente...";

    iniciarEnvioGPS();
    iniciarEnvioBrujula();
  } catch (err) {
    document.getElementById("estado").innerText = "Error: " + err;
  }
}

function iniciarEnvioGPS() {
  navigator.geolocation.watchPosition((pos) => {
    enviarBLE(`G:${pos.coords.latitude},${pos.coords.longitude}`);
  }, (err) => console.error(err), { enableHighAccuracy: true, maximumAge: 5000 });
}

function iniciarEnvioBrujula() {
  window.addEventListener('deviceorientationabsolute', (event) => {
    const heading = event.webkitCompassHeading || Math.abs(event.alpha - 360);
    if (heading == null) return;

    const now = Date.now();
    if (now - lastCalSent < 1500) return; // throttle: máximo cada 1.5s
    lastCalSent = now;

    enviarBLE(`C:${heading.toFixed(1)}`);
    document.getElementById("estado").innerText =
      `Conectado ✅\nBrújula: ${heading.toFixed(1)}°`;
  }, true);
}

async function enviarBLE(texto) {
  if (!characteristic) return;
  try {
    const encoder = new TextEncoder();
    await characteristic.writeValue(encoder.encode(texto));
  } catch (e) {
    console.error("Error enviando BLE:", e);
  }
}
</script>
</body>
</html>
